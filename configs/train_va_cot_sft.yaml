### model
model_name_or_path: /path/to/Qwen3.5-9B
# 640×360 = 230,400 < 262,144 → LF skips PIL pre-resize; image passes through
# to Qwen processor at native render size, matching online RL pipeline.
image_max_pixels: 262144
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true

### dataset
# concat multi-turn WITH `<think>...</think>` injected from legacy CoT data.
# See scripts/build_sft_online_cot_data.py.
dataset: tvrbench_sft_online_cot
dataset_dir: /path/to/tvr-sft-va-cot
template: qwen3_5
# CoT adds ~80 tokens per turn (`<think>...</think>` reasoning). With 26-turn
# max trajs, max sample ~13K → ~15-16K. cutoff 20480 leaves comfortable buffer.
cutoff_len: 20480
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /path/to/output/checkpoints
logging_steps: 10
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
# ZeRO-2 on H200 141GB (plenty of headroom for 9B + 20K cutoff)
deepspeed: ds_z2_config.json
gradient_checkpointing: true
